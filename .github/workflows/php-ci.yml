name: php-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP Syntax Lint
        run: |
          set -e
          find . -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Smoke Test
        run: php tests/smoke_test.php
